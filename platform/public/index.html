<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Exponent Platform — Academy Management Control Panel" />
    <meta name="theme-color" content="#6366f1" />
    <meta property="og:title" content="Exponent Platform" />
    <meta property="og:description" content="The all-in-one academy management software for coaching institutes." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.exponentgrow.in" />

    <!--
      Default favicon: inline SVG — purple gradient E logo.
      Works on all browsers without any file or network request.
      Will be replaced immediately by the uploaded logo if one exists in DB.
    -->
    <link id="favicon" rel="icon" type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%236366f1'/%3E%3Cstop offset='100%25' stop-color='%23a855f7'/%3E%3C%2FlinearGradient%3E%3C%2Fdefs%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Ctext x='16' y='23' text-anchor='middle' font-family='Arial,sans-serif' font-size='20' font-weight='900' fill='white'%3EE%3C%2Ftext%3E%3C%2Fsvg%3E"
    />

    <title>Exponent Platform</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>

    <script>
      // Step 1: Apply cached favicon immediately (before any network request)
      // This is instant — zero latency for returning visitors
      (function() {
        try {
          var cached = localStorage.getItem('exponent_platform_favicon');
          if (cached && cached.startsWith('http')) {
            var link = document.getElementById('favicon');
            if (link) { link.type = 'image/png'; link.href = cached; }
          }
        } catch(e) {}
      })();

      // Step 2: Fetch latest branding from DB in background
      // This ensures new browsers / incognito / other devices always get the right logo
      // Uses the public (no-auth) endpoint
      (function() {
        var API = 'https://api.exponentgrow.in';
        function applyFavicon(url) {
          if (!url || !url.startsWith('http')) return;
          var link = document.getElementById('favicon');
          if (link) { link.type = 'image/png'; link.href = url; }
          else {
            var l = document.createElement('link');
            l.id   = 'favicon';
            l.rel  = 'icon';
            l.type = 'image/png';
            l.href = url;
            document.head.appendChild(l);
          }
          try { localStorage.setItem('exponent_platform_favicon', url); } catch(e) {}
        }
        function applyLogo(url) {
          if (!url || !url.startsWith('http')) return;
          try { localStorage.setItem('exponent_platform_logo', url); } catch(e) {}
          // Dispatch an event so React can pick it up after boot
          window.__exponent_logo_url = url;
        }
        fetch(API + '/platform/auth/public-branding')
          .then(function(r) { return r.json(); })
          .then(function(data) {
            if (data.favicon_url) applyFavicon(data.favicon_url);
            if (data.logo_url)    applyLogo(data.logo_url);
          })
          .catch(function() {}); // silent fail — default logo stays
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
